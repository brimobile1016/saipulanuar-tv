name: IPTV Stream Scanner Automation

on:
  push:
    branches:
      - main
    paths-ignore:
      - "reports/**"
      - "public/**"

  schedule:
    - cron: "30 8 * * *"
    - cron: "30 14 * * *"
    - cron: "30 20 * * *"

  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: iptv-scanner
  cancel-in-progress: true

jobs:
  scan-and-build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Sync Latest Repository
        run: |
          git fetch origin
          git reset --hard origin/main
          git clean -fd

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run IPTV Scanner
        run: npm start

      - name: Commit Generated Files
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add reports public

          if git diff --cached --quiet; then
            echo "No changes detected."
            exit 0
          fi

          git commit -m "chore: update IPTV reports [skip ci]"

          for i in 1 2 3
          do
            echo "Push attempt $i"

            if git push origin HEAD:main; then
              echo "Push successful."
              exit 0
            fi

            echo "Remote changed. Refreshing..."

            git fetch origin
            git reset --hard origin/main

            npm start

            git add reports public

            if git diff --cached --quiet; then
              echo "Nothing changed after refresh."
              exit 0
            fi

            git commit --amend --no-edit
          done

          echo "Push failed after 3 attempts."
          exit 1

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: scan-and-build
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4